<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<title>Honey & Fire — Instagram (1080×1350)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Oswald:wght@300;400;600;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1D0D00;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
  }

  /* IG feed-post 4:5 — 1080×1350 native, viewable at any scaling. */
  .poster {
    position: relative;
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    background: #1D0D00;
    color: #f5edd5;
    font-family: 'Oswald', sans-serif;
  }

  /* Top badge */
  .top-badge {
    position: absolute;
    top: 40px;
    left: 0;
    right: 0;
    text-align: center;
  }
  .top-badge span {
    display: inline-block;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: #e8a030;
    border: 1px solid rgba(232,160,48,0.5);
    padding: 8px 24px;
    border-radius: 2px;
  }

  /* Layout uses absolute positioning with explicit line-heights so the
     rendered geometry matches the design coords (otherwise inherited
     line-heights of ~1.4 push elements well past the canvas edge). */

  /* Singer portraits */
  .singers {
    position: absolute;
    top: 86px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 22px;
  }
  .singer {
    width: 320px;
    height: 390px;
    object-fit: cover;
    border-radius: 4px;
    border: 4px solid #e8a030;
    display: block;
  }
  .singer-honey { object-position: center 12%; }
  .singer-fire  { object-position: center 18%; transform: scaleX(-1); }

  /* Band name */
  .band-name {
    position: absolute;
    top: 525px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 130px;
    line-height: 1.1;
    letter-spacing: -2px;
    color: #f5edd5;
  }
  .band-name .amp { color: #e8841a; font-style: italic; }
  .band-name .fire { color: #f0a040; }

  .tagline {
    position: absolute;
    top: 685px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 22px;
    line-height: 1;
    font-weight: 600;
    letter-spacing: 14px;
    color: rgba(245,237,213,0.6);
  }

  /* Hexagon divider */
  .divider {
    position: absolute;
    top: 725px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 18px;
    width: 540px;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(232,140,20,0.8), transparent);
  }
  .divider-logo {
    width: 90px;
    height: 90px;
    display: block;
  }

  /* Date */
  .date-block {
    position: absolute;
    top: 780px;
    left: 0;
    right: 0;
    text-align: center;
  }
  .date-day {
    font-size: 26px;
    line-height: 1;
    font-weight: 300;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: rgba(245,237,213,0.6);
    display: block;
    margin-bottom: 14px;
  }
  .date-main {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 22px;
    line-height: 1;
  }
  .date-number {
    font-weight: 700;
    font-size: 120px;
    line-height: 1;
    color: #f5edd5;
    letter-spacing: -3px;
  }
  .date-month {
    font-weight: 700;
    font-size: 44px;
    line-height: 1;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: #e8a030;
  }
  .date-time {
    margin-top: 16px;
    font-size: 24px;
    line-height: 1;
    font-weight: 300;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: rgba(245,237,213,0.6);
  }

  /* Venue */
  .venue {
    position: absolute;
    top: 1015px;
    left: 0;
    right: 0;
    text-align: center;
  }
  .venue-name {
    font-size: 50px;
    line-height: 1;
    font-weight: 600;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #f5edd5;
  }
  .venue-address {
    margin-top: 12px;
    font-size: 20px;
    line-height: 1;
    font-weight: 300;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(245,237,213,0.7);
  }

  /* Bottom-left: Grande Giove portrait stacked above the "a seguire /
     Jam Session" label. Anchored by `top` (not `bottom`) so Chrome's
     headless screenshot can't shave the trailing line off — pulling
     the badge ~18px above the canvas bottom keeps the title text
     fully inside the 1350-tall frame. */
  .jam-badge {
    position: absolute;
    top: 1105px;
    left: 70px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .jam-img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(232,140,20,0.6);
    filter: brightness(0.88) saturate(0.95);
  }
  .jam-text { text-align: center; line-height: 1.1; }
  .jam-label {
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(245,237,213,0.6);
  }
  .jam-title {
    font-weight: 500;
    font-size: 44px;
    letter-spacing: 1.5px;
    color: rgba(245,237,213,0.92);
    margin-top: 6px;
  }

  /* Bottom-right: Pub Clown logo stacked above the WhatsApp prenotazioni
     phone number. column-reverse keeps the DOM order link → logo while
     visually placing the logo on top. Same top-anchor trick as
     .jam-badge so the bottom line never gets shaved by the screenshot. */
  .venue-badge {
    position: absolute;
    top: 1105px;
    right: 70px;
    display: flex;
    flex-direction: column-reverse;
    align-items: center;
    gap: 10px;
  }
  .venue-contact { text-decoration: none; text-align: center; color: inherit; }
  .venue-info-label {
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(245,237,213,0.65);
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .venue-info-number {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    font-size: 44px;
    font-weight: 500;
    letter-spacing: 1.5px;
    color: #f5edd5;
    line-height: 1.1;
  }
  .venue-info-number .wa-icon-small {
    width: 44px;
    height: 44px;
    flex-shrink: 0;
  }
  .venue-logo {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    opacity: 0.92;
    filter: drop-shadow(0 0 10px rgba(0,0,0,0.7));
  }
</style>
</head>
<body>
<div class="poster">

  <div class="top-badge"><span>Una serata con</span></div>

  <div class="singers">
    <img class="singer singer-honey" src="images/fulls/08.jpg?v=1aecf7e" alt="Honey – Francesca" />
    <img class="singer singer-fire"  src="images/fulls/09.jpg?v=1aecf7e" alt="Fire – Giorgia" />
  </div>

  <h1 class="band-name">Honey <span class="amp">&amp;</span> <span class="fire">Fire</span></h1>

  <div class="tagline">Pop &nbsp;·&nbsp; Soul &nbsp;·&nbsp; Funk</div>

  <div class="date-block">
    <span class="date-day">Giovedì</span>
    <div class="date-main">
      <span class="date-number">21</span>
      <span class="date-month">Maggio</span>
    </div>
    <div class="date-time">ore 20.00</div>
  </div>

  <div class="venue">
    <div class="venue-name">Pub Clown</div>
    <div class="venue-address">Via Litoranea 24 &middot; Ostia (RM)</div>
  </div>

  <div class="jam-badge">
    <img class="jam-img" src="images/grande_giove.png?v=1aecf7e" alt="Grande Giove" />
    <div class="jam-text">
      <div class="jam-label">a seguire</div>
      <div class="jam-title">Jam Session</div>
    </div>
  </div>

  <div class="venue-badge">
    <a class="venue-contact" href="https://wa.me/393398609330">
      <div class="venue-info-label">Info e prenotazioni</div>
      <div class="venue-info-number">
        <svg class="wa-icon-small" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="16" r="16" fill="#25D366"/>
          <path fill="#fff" d="M23.5 8.5A10.44 10.44 0 0016.01 5.5C10.76 5.5 6.5 9.76 6.5 15.01c0 1.68.44 3.32 1.28 4.76L6.5 25.5l5.87-1.54a10.47 10.47 0 004.64 1.09h.01c5.25 0 9.51-4.26 9.51-9.51A9.46 9.46 0 0023.5 8.5zm-7.49 14.63h-.01c-1.42 0-2.82-.38-4.04-1.1l-.29-.17-3.03.79.81-2.95-.19-.3a8.62 8.62 0 01-1.32-4.59c0-4.77 3.88-8.65 8.65-8.65a8.6 8.6 0 016.12 2.54 8.6 8.6 0 012.53 6.13c-.01 4.77-3.89 8.3-8.23 8.3zm4.74-6.48c-.26-.13-1.54-.76-1.78-.85-.24-.09-.41-.13-.58.13-.17.26-.66.85-.81 1.02-.15.17-.3.19-.56.06-.26-.13-1.1-.41-2.1-1.3-.78-.7-1.3-1.56-1.45-1.82-.15-.26-.02-.4.11-.53.12-.12.26-.3.39-.46.13-.15.17-.26.26-.43.09-.17.04-.32-.02-.45-.06-.13-.58-1.4-.8-1.92-.21-.5-.43-.43-.58-.44l-.5-.01c-.17 0-.45.06-.69.32-.24.26-.9.88-.9 2.14s.92 2.49 1.05 2.66c.13.17 1.81 2.76 4.38 3.87.61.26 1.09.42 1.46.54.61.19 1.17.16 1.61.1.49-.07 1.51-.62 1.72-1.22.21-.6.21-1.11.15-1.22-.07-.1-.24-.16-.5-.29z"/>
        </svg>
        <span>339 860 9330</span>
      </div>
    </a>
    <img class="venue-logo" src="images/pub_clown_logo.png?v=1aecf7e" alt="Il Clown Pub" />
  </div>

</div>
</body>
</html>
