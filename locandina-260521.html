<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<title>Honey & Fire — Live @ Pub Clown, 21 Maggio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Oswald:wght@300;400;600;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1D0D00;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
    min-height: 100vh;
  }

  /* A4 at 96dpi = 794 × 1123px */
  .poster {
    position: relative;
    width: 794px;
    height: 1123px;
    overflow: hidden;
    background: #1D0D00;
    flex-shrink: 0;
  }

  /* Singer portrait photos */
  .singers {
    position: absolute;
    top: 120px;
    left: 0;
    right: 0;
    z-index: 3;
    display: flex;
    justify-content: center;
    gap: 28px;
    padding: 0 58px;
  }
  .singer-photo {
    width: 310px;
    height: 400px;
    object-fit: cover;
    border-radius: 4px;
    border: 3px solid #e8a030;
    box-shadow:
      0 0 0 1px rgba(232,160,48,0.15),
      0 8px 40px rgba(0,0,0,0.9),
      0 2px 12px rgba(0,0,0,0.6);
    display: block;
    flex-shrink: 0;
  }
  .singer-honey { object-position: center 12%; }
  .singer-fire  { object-position: center 18%; transform: scaleX(-1); }

  /* Bottom fade for text legibility */
  .overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 58%;
    z-index: 2;
    background: linear-gradient(
      to bottom,
      transparent 0%,
      rgba(29,13,0,0.7) 25%,
      rgba(29,13,0,0.97) 55%,
      #1D0D00 100%
    );
  }

  /* All content above overlays */
  .content {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding: 0 52px 36px;
    text-align: center;
    color: #f5edd5;
  }

  /* Top badge */
  .top-badge {
    position: absolute;
    top: 32px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 10;
  }

  /* Instagram QR — sits in the empty space on the left of the date, kept
     absolutely positioned so the date itself stays centred in the content
     stack. The image already includes a white quiet zone and the
     @honeyandfire_band caption baked in, so no extra border or label needed. */
  .qr-link {
    position: absolute;
    right: calc(100% + 80px);
    top: 50%;
    transform: translateY(-50%);
    line-height: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .qr-img {
    width: 150px;
    height: auto;
    display: block;
    /* background was recoloured to #1D0D00 so the QR blends with the poster */
  }
  .top-badge span {
    display: inline-block;
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #e8a030;
    border: 1px solid rgba(232,160,48,0.5);
    padding: 5px 18px;
    border-radius: 2px;
  }

  /* Band name */
  .band-name {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 82px;
    line-height: 0.95;
    letter-spacing: -1px;
    color: #f5edd5;
    text-shadow:
      0 0 60px rgba(232,140,20,0.4),
      0 2px 4px rgba(0,0,0,0.8);
    margin-bottom: 8px;
  }
  .band-name .amp {
    color: #e8841a;
    font-style: italic;
  }
  .band-name .fire {
    color: #f0a040;
  }
  .band-name .fire-icon {
    font-size: 0.72em;
    vertical-align: middle;
    filter: drop-shadow(0 0 8px rgba(255,120,20,0.7));
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 12px 0 18px;
    width: 100%;
    max-width: 480px;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(232,140,20,0.7), transparent);
  }
  .divider-logo {
    width: 120px;
    height: 120px;
    flex-shrink: 0;
    /* logo-dark.svg has its own #1D0D00 fill that blends with the poster */
  }

  /* "LIVE" tag */
  .live-tag {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: rgba(245,237,213,0.6);
    margin-top: 14px;
    margin-bottom: 28px;
  }

  /* Date */
  .date-block {
    position: relative;
    margin-bottom: 6px;
  }
  .date-day {
    font-family: 'Oswald', sans-serif;
    font-weight: 300;
    font-size: 18px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(245,237,213,0.6);
    line-height: 1;
  }
  .date-main {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .date-number {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 72px;
    line-height: 1;
    color: #f5edd5;
    text-shadow: 0 0 40px rgba(232,140,20,0.3);
    letter-spacing: -2px;
  }
  .date-stack {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: flex-start;
    height: 72px;
  }
  .date-month {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #e8a030;
    line-height: 1;
  }
  .date-time {
    font-family: 'Oswald', sans-serif;
    font-weight: 300;
    font-size: 15px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(245,237,213,0.55);
    margin-top: 8px;
  }

  /* Thin separator */
  .sep {
    width: 60px;
    height: 1px;
    background: rgba(232,140,20,0.5);
    margin: 22px auto;
  }

  /* Venue */
  .venue-name {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 28px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #f5edd5;
    margin-bottom: 6px;
  }
  .venue-address {
    display: inline-block;
    font-family: 'Oswald', sans-serif;
    font-weight: 300;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(245,237,213,0.6);
    margin-bottom: 24px;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }
  .venue-address:hover { color: #f5edd5; }

  /* WhatsApp contact */
  .contact {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 0;
    text-decoration: none;
    cursor: pointer;
    color: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .wa-icon {
    width: 26px;
    height: 26px;
    flex-shrink: 0;
  }
  .contact-text {
    text-align: left;
  }
  .contact-label {
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(245,237,213,0.5);
    line-height: 1.2;
  }
  .contact-number {
    font-family: 'Oswald', sans-serif;
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 2px;
    color: #f5edd5;
    line-height: 1.2;
  }

  /* Venue badge — bottom right: contact (label + WhatsApp number) + clown icon */
  .venue-badge {
    position: absolute;
    bottom: 30px;
    right: 36px;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .venue-contact {
    text-decoration: none;
    text-align: right;
    color: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .venue-info-label {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: rgba(245,237,213,0.7);
    line-height: 1.3;
    margin-bottom: 4px;
  }
  .venue-info-number {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    font-family: 'Oswald', sans-serif;
    font-size: 17px;
    font-weight: 400;
    letter-spacing: 1.5px;
    color: #f5edd5;
    line-height: 1.2;
  }
  .venue-info-number .wa-icon-small {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }
  .venue-logo {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    object-fit: cover;
    opacity: 0.88;
    filter: drop-shadow(0 0 6px rgba(0,0,0,0.7));
    flex-shrink: 0;
  }

  /* Jam session badge — bottom left */
  .jam-badge {
    position: absolute;
    bottom: 36px;
    left: 36px;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .jam-img {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    object-fit: cover;
    border: 1.5px solid rgba(232,140,20,0.6);
    filter: brightness(0.85) saturate(0.9);
  }
  .jam-text {
    text-align: left;
  }
  .jam-label {
    font-family: 'Oswald', sans-serif;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(245,237,213,0.45);
    line-height: 1.3;
  }
  .jam-title {
    font-family: 'Oswald', sans-serif;
    font-weight: 400;
    font-size: 13px;
    letter-spacing: 1px;
    color: rgba(245,237,213,0.75);
    line-height: 1.3;
  }

  @media print {
    body { padding: 0; background: white; }
    .poster { page-break-after: avoid; }
    @page { size: A4 portrait; margin: 0; }
  }
</style>
</head>
<body>

  </div>

</div><!-- /poster -->
</body>
</html>
