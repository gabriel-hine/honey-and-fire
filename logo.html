<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Honey & Fire — Logo Variants (Cursive)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Tangerine:wght@400;700&family=Sacramento&family=Pinyon+Script&family=Allura&family=Parisienne&family=Italianno&family=Berkshire+Swash&family=Alex+Brush&family=Mrs+Saint+Delafield&family=Mr+Dafoe&family=Mr+De+Haviland&family=Petit+Formal+Script&family=Herr+Von+Muellerhoff&family=Rouge+Script&family=Marck+Script&family=Niconne&family=Yellowtail&family=Pacifico&family=Satisfy&display=swap" rel="stylesheet" />
<style>
  body { margin: 0; background: #1a1a1a; color: #f0f0f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 40px 20px; }
  h1 { text-align: center; font-weight: 300; letter-spacing: 0.1em; margin-bottom: 8px; }
  .subtitle { text-align: center; color: #888; margin-bottom: 48px; font-size: 14px; }
  .section-title { text-align: center; color: #BFA030; letter-spacing: 0.15em; font-size: 12px; margin: 56px 0 24px; text-transform: uppercase; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; max-width: 1400px; margin: 0 auto; }
  .card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.3); display: flex; flex-direction: column; }
  .card.dark { background: #1D0D00; }
  .card .label { padding: 12px 16px; background: #f5f5f5; color: #333; font-size: 13px; font-weight: 500; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .card.dark .label { background: #0a0500; color: #f0f0f0; border-top: 1px solid rgba(191,160,48,0.2); }
  .label small { color: #888; font-weight: 400; font-size: 11px; }
  .svg-holder { display: flex; justify-content: center; align-items: center; padding: 0; }
  .current-tag { display: inline-block; background: #BFA030; color: #1D0D00; font-size: 10px; padding: 2px 8px; border-radius: 3px; letter-spacing: 0.05em; font-weight: 600; }
  .case-tag { display: inline-block; background: #333; color: #ccc; font-size: 10px; padding: 2px 8px; border-radius: 3px; letter-spacing: 0.05em; font-weight: 600; }
  .case-tag.upper { background: #BFA030; color: #1D0D00; }
</style>
</head>
<body>

<h1>Honey &amp; Fire — Cursive Font Explorations</h1>
<p class="subtitle">Script and cursive faces only. Each shown as lowercase (h/f) and capital (H/F).</p>

<div class="section-title">Special — Tangerine with h↔f flourish</div>
<div class="grid" id="custom-grid"></div>

<div class="section-title">Lowercase — light</div>
<div class="grid" id="lower-light"></div>

<div class="section-title">Capitals — light</div>
<div class="grid" id="upper-light"></div>

<div class="section-title">Lowercase — dark (curated)</div>
<div class="grid" id="lower-dark"></div>

<div class="section-title">Capitals — dark (curated)</div>
<div class="grid" id="upper-dark"></div>

<script>
// Cursive/script families only. Each entry has tuning for lowercase (lc.*) and capitals (uc.*).
// Lowercase fonts often need bigger size + descender room; capitals are usually wider with flourishes.
const fonts = [
  { name: "Great Vibes",          note: "current",
    font: "'Great Vibes', cursive",
    lc: { size: 118, y: 283, dxL: -30, dxR: 34 },
    uc: { size: 118, y: 285, dxL: -42, dxR: 42 } },

  { name: "Tangerine",            note: "elegant",
    font: "'Tangerine', cursive",  weight: 700,
    lc: { size: 165, y: 290, dxL: -28, dxR: 28 },
    uc: { size: 150, y: 295, dxL: -38, dxR: 38 } },

  { name: "Sacramento",           note: "casual",
    font: "'Sacramento', cursive",
    lc: { size: 110, y: 280, dxL: -28, dxR: 28 },
    uc: { size: 110, y: 285, dxL: -36, dxR: 36 } },

  { name: "Pinyon Script",        note: "ornate",
    font: "'Pinyon Script', cursive",
    lc: { size: 130, y: 285, dxL: -28, dxR: 28 },
    uc: { size: 120, y: 290, dxL: -42, dxR: 42 } },

  { name: "Allura",               note: "flowing",
    font: "'Allura', cursive",
    lc: { size: 130, y: 285, dxL: -30, dxR: 30 },
    uc: { size: 125, y: 290, dxL: -40, dxR: 40 } },

  { name: "Parisienne",           note: "casual elegant",
    font: "'Parisienne', cursive",
    lc: { size: 100, y: 282, dxL: -28, dxR: 28 },
    uc: { size: 100, y: 287, dxL: -36, dxR: 36 } },

  { name: "Italianno",            note: "elegant flowing",
    font: "'Italianno', cursive",
    lc: { size: 145, y: 290, dxL: -28, dxR: 28 },
    uc: { size: 140, y: 295, dxL: -36, dxR: 36 } },

  { name: "Berkshire Swash",      note: "playful",
    font: "'Berkshire Swash', cursive",
    lc: { size: 100, y: 283, dxL: -32, dxR: 32 },
    uc: { size: 100, y: 285, dxL: -36, dxR: 36 } },

  { name: "Alex Brush",           note: "brush",
    font: "'Alex Brush', cursive",
    lc: { size: 130, y: 287, dxL: -28, dxR: 28 },
    uc: { size: 125, y: 290, dxL: -38, dxR: 38 } },

  { name: "Mrs Saint Delafield",  note: "vintage script",
    font: "'Mrs Saint Delafield', cursive",
    lc: { size: 130, y: 285, dxL: -30, dxR: 30 },
    uc: { size: 125, y: 290, dxL: -42, dxR: 42 } },

  { name: "Mr Dafoe",             note: "elegant script",
    font: "'Mr Dafoe', cursive",
    lc: { size: 130, y: 285, dxL: -28, dxR: 28 },
    uc: { size: 125, y: 290, dxL: -42, dxR: 42 } },

  { name: "Mr De Haviland",       note: "fine script",
    font: "'Mr De Haviland', cursive",
    lc: { size: 135, y: 285, dxL: -28, dxR: 28 },
    uc: { size: 130, y: 290, dxL: -42, dxR: 42 } },

  { name: "Herr Von Muellerhoff", note: "calligraphic",
    font: "'Herr Von Muellerhoff', cursive",
    lc: { size: 145, y: 290, dxL: -30, dxR: 30 },
    uc: { size: 135, y: 295, dxL: -44, dxR: 44 } },

  { name: "Petit Formal Script",  note: "formal",
    font: "'Petit Formal Script', cursive",
    lc: { size: 110, y: 283, dxL: -28, dxR: 28 },
    uc: { size: 105, y: 287, dxL: -38, dxR: 38 } },

  { name: "Rouge Script",         note: "decorative",
    font: "'Rouge Script', cursive",
    lc: { size: 130, y: 287, dxL: -28, dxR: 28 },
    uc: { size: 125, y: 290, dxL: -38, dxR: 38 } },

  { name: "Marck Script",         note: "casual",
    font: "'Marck Script', cursive",
    lc: { size: 115, y: 285, dxL: -28, dxR: 28 },
    uc: { size: 110, y: 288, dxL: -34, dxR: 34 } },

  { name: "Niconne",              note: "soft script",
    font: "'Niconne', cursive",
    lc: { size: 120, y: 285, dxL: -28, dxR: 28 },
    uc: { size: 115, y: 290, dxL: -34, dxR: 34 } },

  { name: "Yellowtail",           note: "retro brush",
    font: "'Yellowtail', cursive",
    lc: { size: 110, y: 283, dxL: -30, dxR: 30 },
    uc: { size: 105, y: 287, dxL: -36, dxR: 36 } },

  { name: "Pacifico",             note: "casual brush",
    font: "'Pacifico', cursive",
    lc: { size: 96,  y: 280, dxL: -30, dxR: 30 },
    uc: { size: 96,  y: 285, dxL: -34, dxR: 34 } },

  { name: "Satisfy",              note: "casual brush",
    font: "'Satisfy', cursive",
    lc: { size: 105, y: 283, dxL: -30, dxR: 30 },
    uc: { size: 100, y: 287, dxL: -34, dxR: 34 } },
];

// Curated subset to also render on dark
const darkPicks = ["Great Vibes", "Tangerine", "Italianno", "Pinyon Script", "Allura", "Mrs Saint Delafield", "Mr Dafoe", "Alex Brush", "Berkshire Swash"];

const flame = `
  <g transform="translate(231, 220) scale(1.5)">
    <path fill="#BFA030" d="M35 19c0-2.062-.367-4.039-1.04-5.868-.46 5.389-3.333 8.157-6.335 6.868-2.812-1.208-.917-5.917-.777-8.164.236-3.809-.012-8.169-6.931-11.794 2.875 5.5.333 8.917-2.333 9.125-2.958.231-5.667-2.542-4.667-7.042-3.238 2.386-3.332 6.402-2.333 9 1.042 2.708-.042 4.958-2.583 5.208-2.84.28-4.418-3.041-2.963-8.333C2.52 10.965 1 14.805 1 19c0 9.389 7.611 17 17 17s17-7.611 17-17z"/>
    <path fill="#E0C060" d="M28.394 23.999c.148 3.084-2.561 4.293-4.019 3.709-2.106-.843-1.541-2.291-2.083-5.291s-2.625-5.083-5.708-6 2.25 6.333-1.247 8.667-3.08 9.084-1.872.426-3.753-.001-3.968-4.007C7.352 23.668 6 26.676 6 30c0 .368.023.73.055 1.09C9.125 34.124 13.342 36 18 36s8.875-1.876 11.945-4.91c.032-.36.055-.722.055-1.09 0-2.187-.584-4.236-1.606-6.001z"/>
  </g>`;

function buildSvg(f, casing, dark) {
  const bg = dark ? "#1D0D00" : "white";
  const ink = dark ? "#f5edd5" : "#1D0D00";
  const t = casing === "upper" ? f.uc : f.lc;
  const hL = casing === "upper" ? "H" : "h";
  const hR = casing === "upper" ? "F" : "f";
  const fw = f.weight ? ` font-weight="${f.weight}"` : "";
  return `
    <svg width="280" height="280" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
      <rect width="500" height="500" fill="${bg}"/>
      <polygon points="442,250 346,416.2 154,416.2 58,250 154,83.8 346,83.8" fill="none" stroke="#BFA030" stroke-width="1.6"/>
      <polygon points="430,250 340,404.6 160,404.6 70,250 160,95.4 340,95.4" fill="none" stroke="#BFA030" stroke-width="0.9"/>
      ${flame}
      <text x="250" y="${t.y}" font-family="${f.font}" font-size="${t.size}"${fw} text-anchor="end"   fill="${ink}" dx="${t.dxL}">${hL}</text>
      <text x="250" y="${t.y}" font-family="${f.font}" font-size="${t.size}"${fw} text-anchor="start" fill="${ink}" dx="${t.dxR}">${hR}</text>
    </svg>`;
}

function buildCard(f, casing, dark) {
  const isCurrent = f.note === "current" && casing === "lower";
  const right = isCurrent
    ? '<span class="current-tag">CURRENT</span>'
    : `<span class="case-tag ${casing}">${casing === "upper" ? "H F" : "h f"}</span>`;
  return `
    <div class="card${dark ? " dark" : ""}">
      <div class="svg-holder">${buildSvg(f, casing, dark)}</div>
      <div class="label"><span>${f.name} <small>· ${f.note}</small></span>${right}</div>
    </div>`;
}

function loadAllFonts() {
  const specs = [];
  for (const f of fonts) {
    const w = f.weight || 400;
    specs.push(`${w} ${f.lc.size}px ${f.font}`);
    specs.push(`${w} ${f.uc.size}px ${f.font}`);
  }
  return Promise.all(specs.map(s => document.fonts.load(s).catch(() => null)));
}

// === Special Tangerine variants =============================================
// Computed glyph geometry for Tangerine Bold at size 165, baseline y=290:
//   h glyph bbox in canvas coords: x=172.45..262.87, y=165.27..290 (top-center 217.7,165)
//   f glyph bbox in canvas coords: x=229.16..367.21, y=170..330.10  (bottom-center 298.2,330)
// Honey gold (#BFA030) matches the brand mark; light fire (#D8581A) is a warm
// orange-red that contrasts cleanly without clashing with the gold flame.
const HONEY = "#BFA030";
const FIRE  = "#D8581A";

const tangerineCommon = `font-family="'Tangerine', cursive" font-weight="700" font-size="165"`;

function specialFlourishSvg(dark) {
  const bg = dark ? "#1D0D00" : "white";
  const ink = dark ? "#f5edd5" : "#1D0D00";
  return `
    <svg width="280" height="280" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
      <rect width="500" height="500" fill="${bg}"/>
      <polygon points="442,250 346,416.2 154,416.2 58,250 154,83.8 346,83.8" fill="none" stroke="#BFA030" stroke-width="1.6"/>
      <polygon points="430,250 340,404.6 160,404.6 70,250 160,95.4 340,95.4" fill="none" stroke="#BFA030" stroke-width="0.9"/>
      ${flame}
      <text x="250" y="290" ${tangerineCommon} text-anchor="end"   fill="${ink}" dx="-28">h</text>
      <text x="250" y="290" ${tangerineCommon} text-anchor="start" fill="${ink}" dx="28">f</text>
      <path d="M 217.7 167 C 295 105, 415 175, 395 250 C 380 320, 340 348, 298.2 328" fill="none" stroke="${ink}" stroke-width="5" stroke-linecap="round"/>
    </svg>`;
}

function specialDualColorSvg(dark) {
  const bg = dark ? "#1D0D00" : "white";
  return `
    <svg width="280" height="280" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
      <rect width="500" height="500" fill="${bg}"/>
      <polygon points="442,250 346,416.2 154,416.2 58,250 154,83.8 346,83.8" fill="none" stroke="#BFA030" stroke-width="1.6"/>
      <polygon points="430,250 340,404.6 160,404.6 70,250 160,95.4 340,95.4" fill="none" stroke="#BFA030" stroke-width="0.9"/>
      ${flame}
      <text x="250" y="290" ${tangerineCommon} text-anchor="end"   fill="${HONEY}" dx="-28">h</text>
      <text x="250" y="290" ${tangerineCommon} text-anchor="start" fill="${FIRE}"  dx="28">f</text>
    </svg>`;
}

// Overlap variant: shift f LEFT (and h slightly right) so the letter bodies
// — not just the ascenders — overlap. Drop the flame from this composition
// since the letter mass now occupies the center; the hexagon mark still anchors
// it. Three intensities so we can pick how aggressive the fusion should look.
function makeOverlapSvg(hDx, fDx) {
  return (dark) => {
    const bg = dark ? "#1D0D00" : "white";
    return `
      <svg width="280" height="280" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
        <rect width="500" height="500" fill="${bg}"/>
        <polygon points="442,250 346,416.2 154,416.2 58,250 154,83.8 346,83.8" fill="none" stroke="#BFA030" stroke-width="1.6"/>
        <polygon points="430,250 340,404.6 160,404.6 70,250 160,95.4 340,95.4" fill="none" stroke="#BFA030" stroke-width="0.9"/>
        <text x="250" y="290" ${tangerineCommon} text-anchor="end"   fill="${HONEY}" dx="${hDx}" opacity="0.92">h</text>
        <text x="250" y="290" ${tangerineCommon} text-anchor="start" fill="${FIRE}"  dx="${fDx}" opacity="0.92">f</text>
      </svg>`;
  };
}
const specialOverlapSvg     = makeOverlapSvg(-20, -55);
const specialOverlapMoreSvg = makeOverlapSvg(-12, -75);
const specialOverlapMaxSvg  = makeOverlapSvg(-4,  -95);

// Overlap variant + flame above the letter mass
function specialOverlapWithFlameSvg(dark) {
  const bg = dark ? "#1D0D00" : "white";
  return `
    <svg width="280" height="280" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
      <rect width="500" height="500" fill="${bg}"/>
      <polygon points="442,250 346,416.2 154,416.2 58,250 154,83.8 346,83.8" fill="none" stroke="#BFA030" stroke-width="1.6"/>
      <polygon points="430,250 340,404.6 160,404.6 70,250 160,95.4 340,95.4" fill="none" stroke="#BFA030" stroke-width="0.9"/>
      <g transform="translate(231, 130) scale(1.1)">
        <path fill="#BFA030" d="M35 19c0-2.062-.367-4.039-1.04-5.868-.46 5.389-3.333 8.157-6.335 6.868-2.812-1.208-.917-5.917-.777-8.164.236-3.809-.012-8.169-6.931-11.794 2.875 5.5.333 8.917-2.333 9.125-2.958.231-5.667-2.542-4.667-7.042-3.238 2.386-3.332 6.402-2.333 9 1.042 2.708-.042 4.958-2.583 5.208-2.84.28-4.418-3.041-2.963-8.333C2.52 10.965 1 14.805 1 19c0 9.389 7.611 17 17 17s17-7.611 17-17z"/>
        <path fill="#E0C060" d="M28.394 23.999c.148 3.084-2.561 4.293-4.019 3.709-2.106-.843-1.541-2.291-2.083-5.291s-2.625-5.083-5.708-6 2.25 6.333-1.247 8.667-3.08 9.084-1.872.426-3.753-.001-3.968-4.007C7.352 23.668 6 26.676 6 30c0 .368.023.73.055 1.09C9.125 34.124 13.342 36 18 36s8.875-1.876 11.945-4.91c.032-.36.055-.722.055-1.09 0-2.187-.584-4.236-1.606-6.001z"/>
      </g>
      <text x="250" y="320" ${tangerineCommon} text-anchor="end"   fill="${HONEY}" dx="-28" opacity="0.92">h</text>
      <text x="250" y="320" ${tangerineCommon} text-anchor="start" fill="${FIRE}"  dx="-29" opacity="0.92">f</text>
    </svg>`;
}

const specials = [
  { name: "Tangerine + flourish",        note: "h-top connects to f-bottom",            render: specialFlourishSvg },
  { name: "Tangerine dual color",        note: "honey-gold h, light-fire f",            render: specialDualColorSvg },
  { name: "Tangerine overlap",           note: "bodies overlap, dual color, no flame",  render: specialOverlapSvg },
  { name: "Tangerine overlap (more)",    note: "deeper overlap",                        render: specialOverlapMoreSvg },
  { name: "Tangerine overlap (max)",     note: "letters nearly fused",                  render: specialOverlapMaxSvg },
  { name: "Tangerine overlap + flame",   note: "shared ascender, flame above",          render: specialOverlapWithFlameSvg },
];

function buildSpecialCard(s, dark) {
  return `
    <div class="card${dark ? " dark" : ""}">
      <div class="svg-holder">${s.render(dark)}</div>
      <div class="label"><span>${s.name} <small>· ${s.note}</small></span><span class="case-tag">special</span></div>
    </div>`;
}

function render() {
  document.getElementById("custom-grid").innerHTML =
    specials.map(s => buildSpecialCard(s, false)).join("") +
    specials.map(s => buildSpecialCard(s, true)).join("");
  document.getElementById("lower-light").innerHTML = fonts.map(f => buildCard(f, "lower", false)).join("");
  document.getElementById("upper-light").innerHTML = fonts.map(f => buildCard(f, "upper", false)).join("");
  document.getElementById("lower-dark").innerHTML  = fonts.filter(f => darkPicks.includes(f.name)).map(f => buildCard(f, "lower", true)).join("");
  document.getElementById("upper-dark").innerHTML  = fonts.filter(f => darkPicks.includes(f.name)).map(f => buildCard(f, "upper", true)).join("");
}

Promise.race([
  loadAllFonts().then(() => document.fonts.ready),
  new Promise(resolve => setTimeout(resolve, 4000)),
]).then(render);
</script>

</body>
</html>
